apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-api
  namespace: django-api
  labels:
    app: django-api
  annotations:
    timestamp: "1759915425"
    argocd-image-updater.argoproj.io/image-list: django-api=ghcr.io/quanmbl4255142/repository_a_ci_cd_fpt_repob_code
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: k8s/deployment.yaml
    argocd-image-updater.argoproj.io/django-api.update-strategy: latest
    argocd-image-updater.argoproj.io/django-api.allow-tags: regexp:^.*$
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-api
  template:
    metadata:
      labels:
        app: django-api
    spec:
      containers:
      - name: django-api
        image: ghcr.io/quanmbl4255142/repository_a_ci_cd_fpt_repob_code:latest
        ports:
        - containerPort: 8000
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: "django_api.settings"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
