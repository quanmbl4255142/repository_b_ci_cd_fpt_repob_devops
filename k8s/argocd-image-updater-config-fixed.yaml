apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: default
data:
  registries.conf: |
    registries:
    - name: GitHub Container Registry
      prefix: ghcr.io
      api_url: https://ghcr.io
      default: true
  argocd.server_addr: argocd-server.argocd-new.svc.cluster.local:80
  argocd.grpc_web: "true"
  argocd.insecure: "true"
  argocd.plaintext: "true"
  git.user: quanmbl4255142
  git.email: your-email@example.com
  git.commit-message: "chore: update image to {{.ImageName}}:{{.ImageTag}}"
  interval: 10m
  log.level: debug
  webhook.enable: "true"
  webhook.port: "8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-image-updater-secret
  namespace: default
type: Opaque
stringData:
  argocd.token: znFK5dWrM1b445bZ
  webhook.ghcr-secret: "your-webhook-secret-here"
