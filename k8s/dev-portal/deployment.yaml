apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-portal
  namespace: dev-portal
  labels:
    app: dev-portal
  annotations:
    argocd-image-updater.argoproj.io/image-list: dev-portal=ghcr.io/quanmbl4255142/dev-portal-service
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: k8s/dev-portal/deployment.yaml
    argocd-image-updater.argoproj.io/dev-portal.update-strategy: latest
    argocd-image-updater.argoproj.io/dev-portal.allow-tags: regexp:^.*$
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dev-portal
  template:
    metadata:
      labels:
        app: dev-portal
    spec:
      containers:
      - name: dev-portal
        image: ghcr.io/quanmbl4255142/dev-portal-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /docs
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /docs
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
