apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev-portal-ingress
  namespace: dev-portal
  labels:
    app: dev-portal
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: dev-portal.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dev-portal-service
            port:
              number: 8080
