apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-app-2-ingress
  namespace: test-app-2
  labels:
    app: test-app-2
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - test-app-2.yourdomain.com
    secretName: test-app-2-tls
  rules:
  - host: test-app-2.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-app-2-service
            port:
              number: 8000
