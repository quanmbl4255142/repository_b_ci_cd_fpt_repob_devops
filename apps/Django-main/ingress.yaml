apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: Django-main-ingress
  namespace: Django-main
  labels:
    app: Django-main
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - Django-main.yourdomain.com
    secretName: Django-main-tls
  rules:
  - host: Django-main.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: Django-main-service
            port:
              number: 8000
