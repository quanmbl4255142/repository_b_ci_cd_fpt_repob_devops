apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev-portal-1-ingress
  namespace: dev-portal-1
  labels:
    app: dev-portal-1
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - dev-portal-1.yourdomain.com
    secretName: dev-portal-1-tls
  rules:
  - host: dev-portal-1.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dev-portal-1-service
            port:
              number: 8000
