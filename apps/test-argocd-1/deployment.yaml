apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-argocd-1
  namespace: test-argocd-1
  labels:
    app: test-argocd-1
  annotations:
    argocd-image-updater.argoproj.io/image-list: test-argocd-1=ghcr.io/quanmbl4255142/test_argocd_1
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: apps/test-argocd-1/deployment.yaml
    argocd-image-updater.argoproj.io/test-argocd-1.update-strategy: latest
    argocd-image-updater.argoproj.io/test-argocd-1.allow-tags: regexp:^.*$
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-argocd-1
  template:
    metadata:
      labels:
        app: test-argocd-1
      annotations:
        timestamp: "1760078563"
    spec:
      initContainers:
      - name: init-data-dir
        image: busybox:latest
        command: ['sh', '-c', 'mkdir -p /app/data && chmod 777 /app/data']
        volumeMounts:
        - name: app-data
          mountPath: /app/data
      containers:
      - name: test-argocd-1
        image: ghcr.io/QuanMBL4255142/repository:latest
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args:
          - |
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            gunicorn --bind 0.0.0.0:8000 django_api.wsgi:application
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
        ports:
        - containerPort: 8000
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: "django_api.settings"
        - name: PYTHONUNBUFFERED
          value: "1"
        volumeMounts:
        - name: app-data
          mountPath: /app/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: test-argocd-1-pvc
