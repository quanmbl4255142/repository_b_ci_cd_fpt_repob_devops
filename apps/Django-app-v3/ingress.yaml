apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: Django-app-v3-ingress
  namespace: Django-app-v3
  labels:
    app: Django-app-v3
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - Django-app-v3.yourdomain.com
    secretName: Django-app-v3-tls
  rules:
  - host: Django-app-v3.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: Django-app-v3-service
            port:
              number: 8000
